<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDN Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="text-slate-800 antialiased flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden sm:flex">
        <div class="h-20 flex items-center px-8 border-b border-slate-100">
            <h1 class="text-2xl font-bold text-orange-600 tracking-tight">YDN Admin</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-orange-50 text-orange-600 rounded-lg font-semibold transition-colors">
                <span class="material-symbols-outlined">inventory_2</span>
                Ürünler
            </a>
            <a href="index.html" target="_blank" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-slate-700 rounded-lg font-medium transition-colors">
                <span class="material-symbols-outlined">open_in_new</span>
                Siteye Git
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white/80 backdrop-blur-sm border-b border-slate-200 flex items-center justify-between px-8 z-10">
            <h2 class="text-xl font-semibold">Ürün Yönetimi</h2>
            <button onclick="document.getElementById('addModal').classList.remove('hidden')" class="bg-orange-600 hover:bg-orange-700 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 transition-transform active:scale-95 shadow-lg shadow-orange-600/20">
                <span class="material-symbols-outlined text-sm">add</span> Yeni Ürün
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div id="loading" class="text-slate-400 text-center py-12 hidden">Yükleniyor...</div>
            <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Products will be listed here -->
            </div>
        </div>
    </main>

    <!-- Add Product Modal -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold">Yeni Ürün Ekle</h3>
                <button onclick="document.getElementById('addModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="addForm" class="p-8 space-y-6 overflow-y-auto">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Ürün Adı *</label>
                        <input type="text" id="pName" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Öne Çıkan? (Büyük Görünüm)</label>
                        <select id="pFeatured" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all">
                            <option value="false">Hayır (Küçük Kart)</option>
                            <option value="true">Evet (Büyük Kart)</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Fiyat (Örn: 399,00) *</label>
                        <input type="text" id="pPrice" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Eski Fiyat (Opsiyonel)</label>
                        <input type="text" id="pOldPrice" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all">
                    </div>
                    <div class="space-y-2 sm:col-span-2">
                        <label class="text-sm font-semibold text-slate-600">Açıklama (Öne çıkan ürünler için)</label>
                        <textarea id="pDesc" rows="3" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all"></textarea>
                    </div>
                    <div class="space-y-2 sm:col-span-2">
                        <label class="text-sm font-semibold text-slate-600">Ürün Görseli *</label>
                        <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 hover:bg-slate-100 transition-colors relative">
                            <input type="file" id="pImage" required accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <span class="material-symbols-outlined text-4xl text-slate-400 mb-2 block">cloud_upload</span>
                            <p class="text-sm text-slate-500 font-medium" id="uploadText">Görsel seçmek için tıklayın veya sürükleyin</p>
                        </div>
                    </div>
                </div>
                <div class="pt-6 border-t border-slate-100 flex justify-end gap-3">
                    <button type="button" onclick="document.getElementById('addModal').classList.add('hidden')" class="px-6 py-2.5 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors">İptal</button>
                    <button type="submit" id="submitBtn" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-lg shadow-orange-600/20 text-center min-w-[120px]">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Load Products
        async function fetchProducts() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}/products`);
                const products = await res.json();
                renderProducts(products);
            } catch (err) {
                console.error(err);
                alert("Ürünler yüklenirken hata oluştu!");
            }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.reverse().forEach(p => {
                const isFeatured = p.isFeatured === true || String(p.isFeatured) === "true";
                grid.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group hover:shadow-lg transition-all flex flex-col">
                        <div class="h-48 bg-slate-50 p-4 flex items-center justify-center relative">
                            <img src="${p.image}" class="max-w-full max-h-full object-contain group-hover:scale-105 transition-transform duration-500" />
                            ${isFeatured ? '<span class="absolute top-3 left-3 bg-orange-100 text-orange-700 text-xs font-bold px-2 py-1 rounded">ÖNE ÇIKAN</span>' : ''}
                            <button onclick="deleteProduct('${p.id}')" class="absolute top-3 right-3 bg-red-100 text-red-600 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 hover:bg-red-600 hover:text-white transition-all">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <h4 class="font-bold text-slate-800 line-clamp-1 mb-1">${p.name}</h4>
                            <div class="flex items-center gap-2 mb-3 mt-auto pt-2">
                                <span class="font-bold text-lg text-orange-600">₺${p.price}</span>
                                ${p.oldPrice ? `<span class="text-sm text-slate-400 line-through">₺${p.oldPrice}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // File input change
        document.getElementById('pImage').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                document.getElementById('uploadText').innerText = e.target.files[0].name;
            } else {
                document.getElementById('uploadText').innerText = "Görsel seçmek için tıklayın veya sürükleyin";
            }
        });

        // Add Product Form Submit
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Yükleniyor...";

            try {
                // 1. Upload Image
                const file = document.getElementById('pImage').files[0];
                const formData = new FormData();
                formData.append('image', file);
                
                const uploadRes = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                
                if (uploadData.error) throw new Error(uploadData.error);

                // 2. Save Product
                const newProduct = {
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    oldPrice: document.getElementById('pOldPrice').value,
                    description: document.getElementById('pDesc').value,
                    isFeatured: document.getElementById('pFeatured').value === "true",
                    image: uploadData.imageUrl // use uploaded path
                };

                const prodRes = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });
                
                if(prodRes.ok) {
                    document.getElementById('addModal').classList.add('hidden');
                    document.getElementById('addForm').reset();
                    document.getElementById('uploadText').innerText = "Görsel seçmek için tıklayın veya sürükleyin";
                    fetchProducts();
                }
            } catch(err) {
                console.error(err);
                alert("Ürün yüklenirken bir hata oluştu.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Kaydet";
            }
        });

        // Delete Product
        async function deleteProduct(id) {
            if(!confirm("Bu ürünü silmek istediğinize emin misiniz?")) return;
            
            try {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            } catch(err) {
                alert("Ürün silinirken hata oluştu.");
            }
        }

        // Init
        fetchProducts();
    </script>
</body>
</html>
